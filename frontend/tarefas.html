<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarefas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="pagina-tarefas">
    
  
    <div class="legenda">
      <span class="categoria estudos">Estudos</span>
      <span class="categoria domesticas">Atividades domésticas</span>
      <span class="categoria entretenimento">Entretenimento</span>
      <span class="categoria compras">Compras</span>
      <span class="categoria outros">Outros</span>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>

    
    <div class="info-bar">
      <span id="data-hora">⏱ Agora: --/--/---- --:--</span>
      <span>Pontos: <strong id="pontuacao">0</strong></span>
    </div>

    <div class="centro">
      <button onclick="abrirModal()">CRIAR ATIVIDADE</button>
    </div>

 
    <div class="ordenacao">
      <label><input type="radio" name="ordem" value="peps" checked> PEPS</label>
      <label><input type="radio" name="ordem" value="rapidos"> +RÁPIDOS</label>
      <label><input type="radio" name="ordem" value="prioridade"> PRIORIDADE</label>
    </div>

  
    <div id="lista-tarefas"></div>

  </div>

  
  <div id="modal-criar" class="modal escondido">
    <div class="modal-conteudo">
      <p id="numero-tarefa">Nº 001/2026</p>
      <label>Nome</label>
      <input type="text" id="nome-tarefa" placeholder="Nome da atividade">
      <label>Duração estimada (minutos)</label>
      <input type="number" id="duracao-tarefa" placeholder="30" min="1">
      <label>Tipo</label>
      <select id="tipo-tarefa">
        <option value="">Selecione</option>
        <option value="Estudos">Estudos</option>
        <option value="Atividades domésticas">Atividades domésticas</option>
        <option value="Entretenimento">Entretenimento</option>
        <option value="Compras">Compras</option>
        <option value="Outros">Outros</option>
      </select>
      <label>Prioridade</label>
      <select id="prioridade-tarefa">
        <option value="1">Baixa</option>
        <option value="2">Média</option>
        <option value="3">Alta</option>
      </select>
      <div class="modal-botoes">
        <button onclick="criarTarefa()">criar</button>
        <button onclick="fecharModal()">cancelar</button>
      </div>
    </div>
  </div>

  
  <div id="modal-concluir" class="modal escondido">
    <div class="modal-conteudo">
      <p>Concluir atividade?</p>
      <div class="modal-botoes">
        <button onclick="confirmarConclusao()">confirmar</button>
        <button onclick="fecharModalConcluir()">cancelar</button>
      </div>
    </div>
  </div>

  
  <div id="modal-parabens" class="modal escondido">
    <div class="modal-conteudo">
      <p id="msg-parabens">Parabéns!<br>Você ganhou 10 pontos!<br>Continue assim!</p>
      <button onclick="fecharParabens()">Vamos lá!</button>
    </div>


  <script src="app.js"></script>
</body>
</html>
